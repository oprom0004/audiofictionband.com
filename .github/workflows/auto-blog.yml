name: Weekly Variable DC Power Supply Content Generator

on:
  schedule:
    # Every Monday at 02:00 UTC (10:00 Beijing time)
    - cron: "0 2 * * 1"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  generate-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Auto Content Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/auto-blog.js

      - name: Commit and Push New Articles
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage new articles and updated history
          git add content/variable-dc-power-supply/

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No new articles generated this run."
          else
            ARTICLE_COUNT=$(git diff --cached --name-only | grep -c '\.md$' || true)
            git commit -m "content: auto-generate ${ARTICLE_COUNT} variable-dc-power-supply article(s) [$(date -u +%Y-%m-%d)]"
            git push origin main
            echo "Pushed ${ARTICLE_COUNT} new article(s) to main."
          fi
